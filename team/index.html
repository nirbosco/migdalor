<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>חותמטק · כניסת צוות</title>
<meta name="description" content="כניסת הצוות המלווה של חותמטק: מובילי בית ומובילי הכשרה.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --kachol: #0046ff;
    --kachol-kehe: #0038cc;
    --tchelet: #0fb4f5;
    --turkiz: #23d7cd;
    --reka: #f0f0f0;
    --lavan: #ffffff;
    --deyo: #0a1330;
    --afor: #5a6072;
    --kav: 1px solid #d9dbe3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Rubik", sans-serif;
    background: var(--reka);
    color: var(--deyo);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    background: var(--kachol);
    color: var(--lavan);
    padding: 42px 24px 140px;
    overflow: hidden;
    text-align: center;
  }
  .hero .burst {
    position: absolute;
    width: 520px; height: 520px;
    opacity: .10;
    inset-inline-end: -140px;
    top: -120px;
    pointer-events: none;
  }
  .hero .logo {
    width: min(240px, 54vw);
    height: auto;
    display: block;
    margin: 0 auto 28px;
  }
  .hero h1 {
    font-size: clamp(44px, 8vw, 72px);
    font-weight: 800;
    letter-spacing: -.02em;
    line-height: 1.05;
  }
  .hero .accent-stripe {
    display: flex; justify-content: center; gap: 8px;
    margin: 22px auto 20px;
  }
  .hero .accent-stripe span {
    width: 54px; height: 6px; border-radius: 999px;
  }
  .hero .accent-stripe span:nth-child(1) { background: var(--turkiz); }
  .hero .accent-stripe span:nth-child(2) { background: var(--tchelet); }
  .hero .accent-stripe span:nth-child(3) { background: var(--lavan); }
  .hero p.lead {
    font-size: clamp(22px, 3.4vw, 28px);
    font-weight: 600;
    max-width: 640px;
    margin: 0 auto;
    line-height: 1.5;
  }
  .hero p.sub {
    font-size: 17px;
    opacity: .85;
    margin-top: 12px;
  }

  /* ===== שתי דלתות הצוות ===== */
  .doors {
    max-width: 720px;
    margin: -90px auto 0;
    padding: 0 20px 10px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    position: relative;
    z-index: 2;
  }
  .door {
    background: var(--lavan);
    border: var(--kav);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(10, 19, 48, .10);
    padding: 30px 26px 26px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .door:hover { transform: translateY(-4px); box-shadow: 0 16px 36px rgba(10,19,48,.14); }
  .door .ico {
    width: 74px; height: 74px;
    border-radius: 50%;
    border: 2px solid var(--kachol);
    display: flex; align-items: center; justify-content: center;
    color: var(--kachol);
    background: #f5f8ff;
  }
  .door .ico svg { width: 44px; height: 44px; fill: currentColor; }
  .door h2 { font-size: 24px; font-weight: 600; }
  .door p { font-size: 16px; color: var(--afor); line-height: 1.5; min-height: 48px; }
  .door a.btn {
    display: inline-block;
    background: var(--kachol);
    color: var(--lavan);
    text-decoration: none;
    font-size: 18px; font-weight: 600;
    padding: 13px 46px;
    border-radius: 999px;
    margin-top: 4px;
    transition: background .12s ease;
  }
  .door a.btn:hover { background: var(--kachol-kehe); }
  .door a.btn.ghost {
    background: transparent;
    color: var(--kachol);
    border: 2px solid var(--kachol);
    padding: 11px 44px;
  }
  .door a.btn.ghost:hover { background: #eef3ff; }

  /* קישור חזרה */
  .back-row {
    text-align: center;
    padding: 22px 20px 0;
    position: relative;
    z-index: 2;
  }
  .back-row a {
    color: var(--kachol);
    font-size: 16px;
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .back-row a:hover { color: var(--kachol-kehe); }

  /* ===== פוטר ===== */
  footer {
    text-align: center;
    padding: 26px 20px 34px;
    color: var(--afor);
    font-size: 15px;
  }
  footer b { color: var(--kachol); font-weight: 600; }

  @media (max-width: 640px) {
    .hero { padding-bottom: 115px; }
    .doors { grid-template-columns: 1fr; margin-top: -75px; max-width: 480px; }
    .door p { min-height: 0; }
  }
</style>
</head>

  <svg class="burst" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="white">

    <path d="M50 92 L42 70 L50 75 L58 70 Z"/>

  <img class="logo" src="../hotam-white.png" alt="חותם · אחריות לחינוך בישראל">
  <h1>חותמטק</h1>
  <div class="accent-stripe"><span></span><span></span><span></span></div>
  <p class="lead">כניסת צוות</p>
  <p class="sub">מובילי בית ומובילי הכשרה נכנסים מכאן. חותמיסטים נכנסים מהעמוד הראשי.</p>
</header>

<main class="doors">
  <section class="door">
    <div class="ico"><svg><use href="#i-telescope"/></svg></div>
    <h2>מוביל בית</h2>
    <p>צופים בשיעורים ששותפו איתכם ונותנים משוב שמצמיח.</p>
    <a class="btn" href="/app/mentor.html">כניסה</a>
  </section>
  <section class="door">
    <div class="ico"><svg><use href="#i-handshake"/></svg></div>
    <h2>אדמין</h2>
    <p>תמונת מצב חיה של כל החותמיסטים, השיבוצים ומי שצריך עזרה היום.</p>
    <a class="btn ghost" href="/app/admin.html">כניסה</a>
  </section>
</main>

<div class="back-row"><a href="/">חזרה לעמוד הראשי</a></div>
