<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>המגדלור: העלאת בדיקה ל-R2</title>
<style>
  body { font-family: "Heebo", -apple-system, Arial, sans-serif; background: #faf6ef; color: #1a1a1a; max-width: 640px; margin: 0 auto; padding: 16px; font-size: 20px; }
  h1 { font-size: 24px; }
  input[type=text], input[type=file] { font-family: inherit; font-size: 17px; width: 100%; min-height: 52px; border: 2px solid #bbb; border-radius: 12px; padding: 8px 12px; margin-top: 10px; direction: ltr; background: #fff; }
  button { font-family: inherit; font-size: 22px; font-weight: 600; width: 100%; min-height: 64px; border: none; border-radius: 16px; background: #d9530f; color: #fff; margin-top: 12px; cursor: pointer; }
  #note { font-size: 18px; color: #444; margin-top: 12px; padding: 12px; background: #fff3cd; border-radius: 12px; }
  #note.ok { background: #e8f5e9; }
</style>
</head>
<body>
<h1>המגדלור: העלאת בדיקה ל-R2</h1>
<p>בודקים שהקובץ עולה ל-R2 דרך ה-Worker. בוחרים קובץ (אפשר את תוצר מבחן הסיבולת מחלק א), נותנים לו שם, ומעלים.</p>
<label>כתובת ה-Worker (בלי /u ובלי /v):</label>
<input id="base" type="text" placeholder="https://xxx.workers.dev">
<label>טוקן (SPIKE_TOKEN):</label>
<input id="token" type="text" placeholder="הטוקן שהגדרת ב-Worker">
<label>שם לקובץ (למשל test1.webm):</label>
<input id="key" type="text" value="test1.webm">
<label>הקובץ:</label>
<input id="file" type="file" accept="video/*">
<button id="go">להעלות</button>
<div id="note"></div>
<script>
  const $ = id => document.getElementById(id);
  ["base", "token"].forEach(k => { $(k).value = localStorage.getItem("migdalor_" + k) || ""; });
  $("go").onclick = () => {
    const base = $("base").value.trim().replace(/\/$/, "");
    const token = $("token").value.trim();
    const key = $("key").value.trim();
    const file = $("file").files[0];
    if (!base || !token || !key || !file) { $("note").textContent = "צריך למלא את כל השדות ולבחור קובץ."; return; }
    localStorage.setItem("migdalor_base", base);
    localStorage.setItem("migdalor_token", token);
    const url = `${base}/u/${encodeURIComponent(key)}?t=${encodeURIComponent(token)}`;
    const xhr = new XMLHttpRequest();
    xhr.open("PUT", url);
    xhr.setRequestHeader("content-type", file.type || "video/webm");
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        $("note").className = "";
        $("note").textContent = `מעלה: ${(e.loaded / 1048576).toFixed(1)} מתוך ${(e.total / 1048576).toFixed(1)}MB (${Math.round(e.loaded / e.total * 100)}%)`;
      }
    };
    xhr.onload = () => {
      if (xhr.status === 200) {
        const viewUrl = `${base}/v/${encodeURIComponent(key)}?t=${encodeURIComponent(token)}`;
        $("note").className = "ok";
        $("note").innerHTML = "הועלה בהצלחה. כתובת הצפייה לבדיקה בנגן:<br><span style='direction:ltr;display:inline-block;font-size:14px;word-break:break-all'>" + viewUrl + "</span>";
      } else {
        $("note").className = "";
        $("note").textContent = `שגיאה ${xhr.status}: ${xhr.responseText}`;
      }
    };
    xhr.onerror = () => { $("note").textContent = "שגיאת רשת. בודקים את הכתובת ואת הגדרות ה-CORS של ה-Worker."; };
    xhr.send(file);
  };
</script>
</body>
</html>
