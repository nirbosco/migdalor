<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>המגדלור: נגן בדיקה</title>
<style>
  body { font-family: "Heebo", -apple-system, Arial, sans-serif; background: #faf6ef; color: #1a1a1a; max-width: 640px; margin: 0 auto; padding: 16px; font-size: 20px; }
  h1 { font-size: 24px; }
  input { font-family: inherit; font-size: 17px; width: 100%; min-height: 52px; border: 2px solid #bbb; border-radius: 12px; padding: 8px 12px; margin-top: 10px; direction: ltr; }
  button { font-family: inherit; font-size: 22px; font-weight: 600; width: 100%; min-height: 64px; border: none; border-radius: 16px; background: #d9530f; color: #fff; margin-top: 12px; cursor: pointer; }
  video { width: 100%; margin-top: 16px; border-radius: 12px; background: #000; }
  #note { font-size: 17px; color: #444; margin-top: 10px; }
</style>
</head>
<body>
<h1>המגדלור: נגן בדיקה (ספייק חלק ב)</h1>
<p>מדביקים את כתובת ה-Worker המלאה (כולל ‎/v/‎ ו-‎?t=‎) ולוחצים לנגן. הבדיקה: ניגון חלק, ודילוג חופשי קדימה ואחורה בציר הזמן, גם בטלפון.</p>
<input id="src" placeholder="https://xxx.workers.dev/v/FILE_ID?t=TOKEN">
<button id="play">לנגן</button>
<div id="note"></div>
<video id="v" controls playsinline preload="metadata"></video>
<script>
  const v = document.getElementById("v"), note = document.getElementById("note");
  // קובצי webm של MediaRecorder מגיעים בלי משך (duration=Infinity).
  // הטריק המוכר: קפיצה לסוף מאלצת את הדפדפן לחשב את המשך האמיתי, ואז חוזרים להתחלה.
  v.addEventListener("loadedmetadata", () => {
    if (v.duration === Infinity) {
      const back = () => { v.removeEventListener("seeked", back); v.currentTime = 0; };
      v.addEventListener("seeked", back);
      v.currentTime = 1e7;
    }
  });
  document.getElementById("play").onclick = () => {
    const url = document.getElementById("src").value.trim();
    if (!url) return;
    localStorage.setItem("migdalor_player_src", url);
    v.src = url;
    v.play().catch(e => note.textContent = "שגיאת ניגון: " + e.message);
  };
  document.getElementById("src").value = localStorage.getItem("migdalor_player_src") || "";
  v.addEventListener("error", () => note.textContent = "שגיאה בטעינת הווידאו (קוד " + (v.error && v.error.code) + "). בודקים את הכתובת והטוקן.");
  v.addEventListener("waiting", () => note.textContent = "טוען...");
  v.addEventListener("playing", () => note.textContent = "מנגן. עכשיו לדלג בציר הזמן קדימה ואחורה ולראות שהדילוג מהיר.");
  v.addEventListener("seeking", () => note.textContent = "מדלג...");
  v.addEventListener("seeked", () => note.textContent = "הדילוג הצליח.");
</script>
</body>
</html>
