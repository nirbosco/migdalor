<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>חותמטק · המערכת של חותם נעמי</title>
<meta name="description" content="חותמטק: מצלמים שיעור, משתפים את מוביל הבית, מקבלים משוב שמצמיח. המערכת של חותם נעמי.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --kachol: #0046ff;
    --kachol-kehe: #0038cc;
    --tchelet: #0fb4f5;
    --turkiz: #23d7cd;
    --reka: #f0f0f0;
    --lavan: #ffffff;
    --deyo: #0a1330;
    --afor: #5a6072;
    --kav: 1px solid #d9dbe3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Rubik", sans-serif;
    background: var(--reka);
    color: var(--deyo);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HERO ===== */
  .hero {
    position: relative;
    background: var(--kachol);
    color: var(--lavan);
    padding: 48px 24px 150px;
    overflow: hidden;
    text-align: center;
  }
  /* הד לכוכב הלוגו: חיצים רכים ברקע */
  .hero .burst {
    position: absolute;
    width: 520px; height: 520px;
    opacity: .10;
    inset-inline-end: -140px;
    top: -120px;
    pointer-events: none;
  }
  .hero .burst.b2 {
    inset-inline-end: auto;
    inset-inline-start: -180px;
    top: auto; bottom: -200px;
    width: 620px; height: 620px;
    opacity: .07;
    transform: rotate(25deg);
  }
  .hero .logo {
    width: min(300px, 62vw);
    height: auto;
    display: block;
    margin: 0 auto 34px;
  }
  .hero h1 {
    font-size: clamp(56px, 10vw, 96px);
    font-weight: 800;
    letter-spacing: -.02em;
    line-height: 1.05;
  }
  .hero .accent-stripe {
    display: flex; justify-content: center; gap: 8px;
    margin: 26px auto 24px;
  }
  .hero .accent-stripe span {
    width: 54px; height: 6px; border-radius: 999px;
  }
  .hero .accent-stripe span:nth-child(1) { background: var(--turkiz); }
  .hero .accent-stripe span:nth-child(2) { background: var(--tchelet); }
  .hero .accent-stripe span:nth-child(3) { background: var(--lavan); }
  .hero p.lead {
    font-size: clamp(20px, 3.2vw, 26px);
    font-weight: 500;
    max-width: 640px;
    margin: 0 auto;
    line-height: 1.5;
  }
  .hero p.sub {
    font-size: 17px;
    opacity: .85;
    margin-top: 12px;
  }

  /* ===== כרטיס הכניסה של החותמיסטים ===== */
  .entry {
    max-width: 620px;
    margin: -95px auto 0;
    padding: 0 20px 30px;
    position: relative;
    z-index: 2;
  }
  .entry-card {
    background: var(--lavan);
    border: var(--kav);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(10, 19, 48, .10);
    padding: 36px 30px 32px;
    text-align: center;
  }
  .entry-card a.btn-big {
    display: block;
    background: var(--kachol);
    color: var(--lavan);
    text-decoration: none;
    font-size: 24px;
    font-weight: 700;
    padding: 20px 24px;
    border-radius: 999px;
    box-shadow: 0 6px 20px rgba(0, 70, 255, .22);
    transition: background .12s ease, box-shadow .12s ease, transform .08s ease;
  }
  .entry-card a.btn-big:hover { background: var(--kachol-kehe); box-shadow: 0 8px 26px rgba(0,70,255,.28); }
  .entry-card a.btn-big:active { transform: translateY(1px); }
  .entry-card .what {
    margin-top: 22px;
    font-size: 19px;
    color: var(--afor);
    line-height: 1.6;
  }

  /* ===== פוטר ===== */
  footer {
    text-align: center;
    padding: 26px 20px 34px;
    color: var(--afor);
    font-size: 15px;
  }
  footer b { color: var(--kachol); font-weight: 600; }
  footer .team-link { margin-top: 12px; }
  footer .team-link a {
    color: var(--afor);
    font-size: 14px;
    font-weight: 400;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  footer .team-link a:hover { color: var(--kachol); }

  @media (max-width: 820px) {
    .hero { padding-bottom: 120px; }
    .entry { margin-top: -80px; }
    .entry-card a.btn-big { font-size: 21px; padding: 18px 20px; }
  }
</style>
</head>
<body>

<header class="hero">
  <!-- הד גרפי לכוכב החיצים של הלוגו -->
  <svg class="burst" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="white">
    <path d="M50 8 L58 30 L50 25 L42 30 Z"/>
    <path d="M50 92 L42 70 L50 75 L58 70 Z"/>
    <path d="M8 50 L30 42 L25 50 L30 58 Z"/>
    <path d="M92 50 L70 58 L75 50 L70 42 Z"/>
    <path d="M20 20 L38 32 L29 33 L28 42 Z"/>
    <path d="M80 80 L62 68 L71 67 L72 58 Z"/>
    <path d="M80 20 L68 38 L67 29 L58 28 Z"/>
    <path d="M20 80 L32 62 L33 71 L42 72 Z"/>
  </svg>
  <svg class="burst b2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="white">
    <path d="M50 8 L58 30 L50 25 L42 30 Z"/>
    <path d="M50 92 L42 70 L50 75 L58 70 Z"/>
    <path d="M8 50 L30 42 L25 50 L30 58 Z"/>
    <path d="M92 50 L70 58 L75 50 L70 42 Z"/>
  </svg>

  <img class="logo" src="hotam-white.png" alt="חותם · אחריות לחינוך בישראל">
  <h1>חותמטק</h1>
  <div class="accent-stripe"><span></span><span></span><span></span></div>
  <p class="lead">מצלמים שיעור. משתפים את מוביל הבית. מקבלים משוב שמצמיח.</p>
  <p class="sub">המערכת של חותם נעמי לליווי אישי ולצמיחה מקצועית בהוראה.</p>
</header>

<main class="entry">
  <div class="entry-card">
    <a class="btn-big" href="/app/">כניסה לחותמטק</a>
    <p class="what">
      מצלמים שיעור מהטלפון, משתפים עם מוביל הבית שלכם,
      ומקבלים משוב שמצמיח. הכול במקום אחד, פשוט ובטוח.
    </p>
  </div>
</main>

<footer>
  <b>חותם</b> · אחריות לחינוך בישראל · תוכנית חותם נעמי
  <div class="team-link"><a href="/team/">כניסת צוות</a></div>
</footer>

</body>
</html>
